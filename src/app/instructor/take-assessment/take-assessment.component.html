<div class="min-h-screen bg-gray-50">
    <!-- Header -->
    <header class="sticky top-0 bg-white border-b shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="py-4 flex items-center justify-between">
                <div class="flex items-center space-x-4">
                    <h1 class="text-xl font-semibold">Networking 2: OSI Model Assessment</h1>
                    <div class="flex items-center text-orange-600">
                        <i class="fas fa-clock mr-1"></i>
                        <span class="font-mono">{{formatTime(timeLeft)}}</span>
                    </div>
                </div>
                <button class="px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600"
                    (click)="isSubmitDialogOpen = true">
                    Submit Assessment
                </button>
            </div>
            <div class="h-1 bg-gray-200 rounded-full">
                <div class="h-full bg-blue-600 rounded-full transition-all" [style.width.%]="getProgressValue()"></div>
            </div>
        </div>
    </header>

    <!-- Main content -->
    <main class="max-w-4xl mx-auto px-4 py-8">
        <div class="bg-white rounded-lg shadow-sm p-6">
            <!-- Question Navigation -->
            <div class="flex flex-wrap gap-2 mb-6">
                <button *ngFor="let q of questions; let i = index" [class]="'w-10 h-10 rounded-lg border ' + 
                                (currentQuestion === i ? 'bg-black text-white' : 'hover:bg-gray-50') +
                                (q.isAnswered ? ' border-green-500' : '') +
                                (q.isFlagged ? ' border-yellow-500' : '')" (click)="setCurrentQuestion(i)">
                    {{i + 1}}
                </button>
            </div>

            <!-- Question Content -->
            <div class="space-y-6">
                <div class="flex items-center justify-between">
                    <h2 class="text-lg font-medium">Question {{currentQuestion + 1}}</h2>
                    <button class="p-2 hover:bg-gray-100 rounded-lg"
                        [class.text-yellow-500]="questions[currentQuestion].isFlagged" (click)="handleFlag()">
                        <i class="fas fa-flag mr-2"></i>
                        Flag for review
                    </button>
                </div>

                <p class="text-lg">{{questions[currentQuestion].question}}</p>

                <!-- Question Types -->
                <div class="mt-4" [ngSwitch]="questions[currentQuestion].type">
                    <!-- Multiple Choice -->
                    <div *ngSwitchCase="'multiple-choice'" class="space-y-3">
                        <div *ngFor="let option of questions[currentQuestion].options; let i = index"
                            class="flex items-center space-x-2">
                            <input type="radio" [id]="'option-' + i"
                                [name]="'question-' + questions[currentQuestion].id" [value]="option"
                                [checked]="answers[questions[currentQuestion].id] === option"
                                (change)="handleAnswer(option)" />
                            <label [for]="'option-' + i">{{option}}</label>
                        </div>
                    </div>

                    <!-- Short Answer -->
                    <textarea *ngSwitchCase="'short-answer'" placeholder="Type your answer here..."
                        class="w-full min-h-[200px] p-2.5 border rounded-lg"
                        [(ngModel)]="answers[questions[currentQuestion].id]"
                        (ngModelChange)="handleAnswer($event)"></textarea>

                    <!-- Enumeration -->
                    <div *ngSwitchCase="'enumeration'" class="space-y-2">
                        <div *ngFor="let _ of [1,2,3,4]; let i = index" class="flex gap-2">
                            <span class="text-sm font-medium w-6">{{i + 1}}.</span>
                            <input type="text" [placeholder]="'Answer ' + (i + 1)"
                                class="flex-1 p-2.5 border rounded-lg" [value]="getEnumerationValue(i)"
                                (input)="handleEnumerationAnswer($event, i)" />
                        </div>
                    </div>

                    <!-- True/False -->
                    <div *ngSwitchCase="'true-false'" class="space-y-3">
                        <div class="flex items-center space-x-2">
                            <input type="radio" id="true" [name]="'question-' + questions[currentQuestion].id"
                                value="true" [checked]="answers[questions[currentQuestion].id] === 'true'"
                                (change)="handleAnswer('true')" />
                            <label for="true">True</label>
                        </div>
                        <div class="flex items-center space-x-2">
                            <input type="radio" id="false" [name]="'question-' + questions[currentQuestion].id"
                                value="false" [checked]="answers[questions[currentQuestion].id] === 'false'"
                                (change)="handleAnswer('false')" />
                            <label for="false">False</label>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Navigation Buttons -->
            <div class="flex justify-between mt-8">
                <button class="px-4 py-2 border rounded-lg hover:bg-gray-50 flex items-center"
                    (click)="setCurrentQuestion(currentQuestion - 1)" [disabled]="currentQuestion === 0">
                    <i class="fas fa-chevron-left mr-2"></i>
                    Previous
                </button>
                <button class="px-4 py-2 border rounded-lg hover:bg-gray-50 flex items-center"
                    (click)="setCurrentQuestion(currentQuestion + 1)"
                    [disabled]="currentQuestion === questions.length - 1">
                    Next
                    <i class="fas fa-chevron-right ml-2"></i>
                </button>
            </div>
        </div>
    </main>

    <!-- Submit Dialog -->
    <div *ngIf="isSubmitDialogOpen" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
        <div class="bg-white rounded-lg p-6 max-w-md w-full mx-4">
            <h3 class="text-lg font-semibold mb-2">Submit Assessment</h3>
            <p class="text-gray-600 mb-4">
                Are you sure you want to submit your assessment? This action cannot be undone.
            </p>
            <div *ngIf="hasUnansweredQuestions()" class="flex items-center text-yellow-600 mb-4">
                <i class="fas fa-exclamation-triangle mr-2"></i>
                You have unanswered questions
            </div>
            <div class="flex justify-end gap-2">
                <button class="px-4 py-2 border rounded-lg hover:bg-gray-50" (click)="isSubmitDialogOpen = false">
                    Cancel
                </button>
                <button class="px-4 py-2 bg-black text-white rounded-lg hover:bg-gray-800" (click)="handleSubmit()">
                    Submit
                </button>
            </div>
        </div>
    </div>
</div>
