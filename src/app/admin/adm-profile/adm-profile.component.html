<div class="bg-gray-50 min-h-screen w-full overflow-x-hidden">
    <div class="flex w-full">
        <app-sidebar></app-sidebar>
        <div class="flex-1 ml-0 md:ml-20 w-full">
            <header class="bg-white shadow-sm fixed top-0 right-0 w-full md:w-[calc(100%-80px)] z-40">
                <div class="w-full px-4 md:px-6 py-3 md:py-4">
                    <div class="flex items-center justify-between">
                        <h1 class="text-lg md:text-xl lg:text-2xl font-semibold text-gray-900">Admin Profile</h1>
                        <div class="flex items-center">
                            <div class="hidden md:flex items-center mr-4">
                                <span class="text-sm text-gray-500 mr-2">Quick Actions:</span>
                                <button
                                    class="px-4 py-2 text-sm font-medium text-gray-700 bg-gray-50 hover:bg-gray-100 rounded-md transition-colors mr-2">
                                    New Assessment
                                </button>
                                <button
                                    class="px-4 py-2 text-sm font-medium text-gray-700 bg-gray-50 hover:bg-gray-100 rounded-md transition-colors">
                                    Add Student
                                </button>
                            </div>
                            <div *ngIf="!isMobile" class="flex items-center">
                                <div class="relative mr-3">
                                    <div
                                        class="h-8 w-8 md:h-10 md:w-10 rounded-full bg-gray-100 flex items-center justify-center overflow-hidden">
                                        <img *ngIf="profile" [src]="profile" alt="Profile"
                                            class="w-full h-full object-cover">
                                        <span *ngIf="!profile" class="text-base md:text-lg font-medium text-gray-600">
                                            {{username.charAt(0) || 'A'}}
                                        </span>
                                    </div>
                                    <div
                                        class="absolute bottom-0 right-0 h-2.5 w-2.5 md:h-3 md:w-3 rounded-full bg-green-500 ring-2 ring-white">
                                    </div>
                                </div>
                                <div class="text-left">
                                    <div class="text-sm font-medium text-gray-900">{{username}}</div>
                                    <div class="text-xs text-gray-500">Instructor</div>
                                </div>
                            </div>
                            <button *ngIf="isMobile" (click)="toggleSidebar()"
                                class="p-2 rounded-md hover:bg-gray-100 transition-colors">
                                <i class="fas fa-bars w-5 h-5 text-gray-600"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </header>

            <div class="h-[65px] md:h-[68px] w-full"></div>

            <div *ngIf="isLoading"
                class="flex items-center justify-center min-h-[calc(100vh-68px)] bg-white transition-colors duration-900">
                <div class="text-center animate-fade-in">
                    <div class="relative w-16 h-16 mx-auto">
                        <div
                            class="absolute inset-0 rounded-full border-4 border-indigo-600 border-t-transparent animate-spin">
                        </div>
                        <div class="absolute inset-2 rounded-full border-4 border-indigo-300 border-b-transparent animate-spin"
                            style="animation-direction: reverse;">
                        </div>
                    </div>
                    <p class="mt-5 text-gray-600 text-lg font-medium animate-pulse">
                        Loading instructor data...
                    </p>
                </div>
            </div>

            <main class="p-2 md:p-4 w-full">

            </main>

        </div>
    </div>
</div>
