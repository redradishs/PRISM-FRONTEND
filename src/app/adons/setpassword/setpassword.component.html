<div class="page-background">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
</div>

<div class="form-container">
    <div class="card">
        <div class="card-content">

            <div id="step3">
                <div class="step-header">
                    <div class="icon-wrapper header-icon">
                        <svg class="icon" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 2 L14.5 9 L21 9 L16 14 L18 21 L12 17 L6 21 L8 14 L3 9 L9.5 9 Z" />
                        </svg>
                    </div>
                    <h2 class="step-title">Set Your Password</h2>
                    <p class="step-description">If you plan to signin manually, set your password here otherwise you may
                        skip this step.</p>
                </div>

                <form [formGroup]="profileForm" (ngSubmit)="onSubmitPassword()" class="form-fields">
                    <div class="form-group">
                        <label for="passwordInput" class="form-label">New Password</label>
                        <div class="password-input-wrapper">
                            <input [type]="showPassword ? 'text' : 'password'" id="passwordInput"
                                formControlName="password" class="form-input" placeholder="Enter your password"
                                required>
                            <button type="button" class="password-toggle-btn" (click)="togglePasswordVisibility()"
                                [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'">
                                <svg *ngIf="!showPassword" class="icon" viewBox="0 0 24 24" fill="none"
                                    stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                                <svg *ngIf="showPassword" class="icon" viewBox="0 0 24 24" fill="none"
                                    stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <path
                                        d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24">
                                    </path>
                                    <line x1="1" y1="1" x2="23" y2="23"></line>
                                </svg>
                            </button>
                        </div>

                        <div class="password-requirements" *ngIf="password.length > 0">
                            <p class="requirements-title">Password Requirements:</p>
                            <ul class="requirements-list">
                                <li [class.met]="hasMinLength" [class.unmet]="!hasMinLength">
                                    <svg class="requirement-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <polyline *ngIf="hasMinLength" points="20 6 9 17 4 12"></polyline>
                                        <circle *ngIf="!hasMinLength" cx="12" cy="12" r="10"></circle>
                                    </svg>
                                    <span>At least 8 characters</span>
                                </li>
                                <li [class.met]="hasUppercase" [class.unmet]="!hasUppercase">
                                    <svg class="requirement-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <polyline *ngIf="hasUppercase" points="20 6 9 17 4 12"></polyline>
                                        <circle *ngIf="!hasUppercase" cx="12" cy="12" r="10"></circle>
                                    </svg>
                                    <span>At least one uppercase letter</span>
                                </li>
                                <li [class.met]="hasLowercase" [class.unmet]="!hasLowercase">
                                    <svg class="requirement-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <polyline *ngIf="hasLowercase" points="20 6 9 17 4 12"></polyline>
                                        <circle *ngIf="!hasLowercase" cx="12" cy="12" r="10"></circle>
                                    </svg>
                                    <span>At least one lowercase letter</span>
                                </li>
                                <li [class.met]="hasSpecialChar" [class.unmet]="!hasSpecialChar">
                                    <svg class="requirement-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <polyline *ngIf="hasSpecialChar" points="20 6 9 17 4 12"></polyline>
                                        <circle *ngIf="!hasSpecialChar" cx="12" cy="12" r="10"></circle>
                                    </svg>
                                    <span>At least one special character (!#$%^&*...)</span>
                                </li>
                            </ul>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn btn-outline" (click)="goBack()">
                            <svg class="icon btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10"></circle>
                            </svg>
                            SKIP
                        </button>
                        <button type="submit" class="btn btn-primary" [disabled]="!isPasswordValid || isSubmitting">
                            <span class="btn-text">{{isSubmitting ? 'Saving...' : 'Save Password'}}</span>
                            <svg class="icon btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="9 18 15 12 9 6"></polyline>
                            </svg>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
