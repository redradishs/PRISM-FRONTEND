name: OTA github-build

on:
  workflow_dispatch:
    inputs:
      gcs_path:
        description: Full object path (e.g. gs://bucket/path/file.apk)
        required: true
        type: string
      file_extension:
        description: Package type (no leading dot required)
        required: false
        default: apk
        type: string

jobs:
  post-github-build:
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/github-build
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}@${GITHUB_SHA:0:7}"
          ARTIFACT_NAME="run-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

          BODY="$(jq -nc \
            --arg version "$VERSION" \
            --arg build "$GITHUB_RUN_NUMBER" \
            --arg file_extension "${{ inputs.file_extension }}" \
            --arg gcs_path "${{ inputs.gcs_path }}" \
            --arg repo "$GITHUB_REPOSITORY" \
            --argjson run_id "$GITHUB_RUN_ID" \
            --arg artifact_name "$ARTIFACT_NAME" \
            '{version: $version, build: $build, file_extension: $file_extension, gcs_path: $gcs_path, repo: $repo, run_id: $run_id, artifact_name: $artifact_name}')"

          curl -sS -f -X POST "http://152.42.179.225:6500/api/github-build" \
            -H "Content-Type: application/json" \
            -d "$BODY"
